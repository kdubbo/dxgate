# cargo-deny configuration — supply-chain gating for dxgate.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Fail on security vulnerabilities; surface unmaintained/yanked crates.
version = 2
yanked = "deny"
# These all originate from the pinned rustls 0.21 TLS stack (proxy) and kube's
# transitive deps. The real fix is a rustls 0.21 -> 0.23 upgrade, which changes
# the mTLS verifier / ClientConfig API and is tracked as a separate task; these
# are low-impact in dxgate's usage (see notes) and ignored until then.
ignore = [
    # rustls-pemfile is unmaintained (no vuln, no safe upgrade in the 0.21 line).
    "RUSTSEC-2025-0134",
    # rustls-webpki name-constraint bugs: reachable only after signature
    # verification and require a misissued cert to exploit.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    # rustls-webpki CRL-parsing panic: dxgate does not use CRLs, so unreachable.
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
# Permissive licenses acceptable for an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[[licenses.exceptions]]
# ring bundles code under multiple permissive terms; accept its aggregate.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT"]

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
