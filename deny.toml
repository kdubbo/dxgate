# cargo-deny configuration — supply-chain gating for dxgate.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Fail on security vulnerabilities; surface unmaintained/yanked crates.
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[[licenses.exceptions]]
# ring bundles code under multiple permissive terms; accept its aggregate.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT"]

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
