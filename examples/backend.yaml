apiVersion: apps/v1
kind: Deployment
metadata:
  name: dxgate-example-backend
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate-example-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dxgate-example-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dxgate-example-backend
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - -listen=:8080
            - -text=dxgate example backend
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dxgate-example-backend
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate-example-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dxgate-example-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
