apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dxgate-controller
  labels:
    app.kubernetes.io/name: dxgate
rules:
  - apiGroups: ["gateway.dxgate.io"]
    resources:
      - dxgates
      - dxgatebackends
      - dxgateroutes
      - dxgatepolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.dxgate.io"]
    resources:
      - dxgates/status
      - dxgatebackends/status
      - dxgateroutes/status
      - dxgatepolicies/status
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dxgate-controller
  labels:
    app.kubernetes.io/name: dxgate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dxgate-controller
subjects:
  - kind: ServiceAccount
    name: dxgate
    namespace: dubbo-system
