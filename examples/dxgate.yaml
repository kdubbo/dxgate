apiVersion: v1
kind: Namespace
metadata:
  name: dubbo-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dxgate-runtime
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate
data:
  bootstrap.json: |
    {
      "xds_address": "http://dubbod.dubbo-system.svc:15012",
      "listener_names": ["dxgate.dubbo-system.svc.cluster.local:80"],
      "cluster_id": "Kubernetes",
      "dns_domain": "cluster.local"
    }
  runtime.yaml: |
    version: k8s-example
    listeners:
      - name: http-80
        bind: "0.0.0.0:80"
        protocol: http
        virtual_hosts:
          - name: wildcard
            domains: ["*"]
            routes:
              - name: default
                matches:
                  - path:
                      type: prefix
                      value: /
                weighted_clusters:
                  - name: example-backend
                    weight: 100
    clusters:
      - name: example-backend
        endpoints:
          - address: dxgate-example-backend.dubbo-system.svc.cluster.local
            port: 8080
            healthy: true
    secrets: []
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dxgate
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dxgate
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dxgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dxgate
    spec:
      serviceAccountName: dxgate
      containers:
        - name: dxgate
          image: kdubbo/dxgate:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DXGATE_BOOTSTRAP
              value: /etc/dxgate/bootstrap.json
            - name: DXGATE_STATIC_CONFIG
              value: /etc/dxgate/runtime.yaml
            - name: DXGATE_HTTP_ADDR
              value: 0.0.0.0:8080
            - name: DXGATE_ADMIN_ADDR
              value: 0.0.0.0:15021
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INSTANCE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 15021
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: runtime
              mountPath: /etc/dxgate
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: runtime
          configMap:
            name: dxgate-runtime
            items:
              - key: bootstrap.json
                path: bootstrap.json
              - key: runtime.yaml
                path: runtime.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: dxgate
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: dxgate
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: dxgate-admin
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: dxgate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dxgate
  ports:
    - name: admin
      port: 15021
      targetPort: admin
